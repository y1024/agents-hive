<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">agents-hive runtime flow</title>
  <desc id="desc">A runtime flow diagram from user request to planning, ReAct loop, tool calls, human approval, trace replay, quality evaluation, and regression learning.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8f3ea"/>
      <stop offset="1" stop-color="#edf5f8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#263b4a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#315466"/>
    </marker>
    <style>
      text { font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2933; }
      .title { font-size: 34px; font-weight: 800; }
      .subtitle { font-size: 16px; fill: #53636f; }
      .stepTitle { font-size: 17px; font-weight: 800; }
      .small { font-size: 13px; fill: #556672; }
      .num { font-size: 13px; font-weight: 800; fill: #fff; }
      .card { fill: #fffdf8; stroke: #d9d2c2; stroke-width: 1.2; }
      .guard { fill: #edf8f1; stroke: #95c4a7; stroke-width: 1.2; }
      .quality { fill: #eef5ff; stroke: #9dbbdf; stroke-width: 1.2; }
      .line { fill: none; stroke: #315466; stroke-width: 2.3; marker-end: url(#arrow); }
      .dash { fill: none; stroke: #8196a3; stroke-width: 1.8; stroke-dasharray: 7 7; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1200" height="520" rx="28" fill="url(#bg)"/>
  <text class="title" x="60" y="72">Runtime Flow</text>
  <text class="subtitle" x="60" y="104">从用户请求到工具调用、人工确认、可回放轨迹与质量回归的统一执行链路</text>

  <g filter="url(#shadow)">
    <rect class="card" x="60" y="170" width="150" height="130" rx="16"/>
    <circle cx="90" cy="200" r="15" fill="#b27b34"/>
    <text class="num" x="86" y="205">1</text>
    <text class="stepTitle" x="84" y="238">Request</text>
    <text class="small" x="84" y="265">Web · CLI · API · IM</text>
  </g>
  <g filter="url(#shadow)">
    <rect class="card" x="260" y="170" width="150" height="130" rx="16"/>
    <circle cx="290" cy="200" r="15" fill="#b27b34"/>
    <text class="num" x="286" y="205">2</text>
    <text class="stepTitle" x="284" y="238">Plan</text>
    <text class="small" x="284" y="265">intent · todos · context</text>
  </g>
  <g filter="url(#shadow)">
    <rect class="card" x="460" y="170" width="150" height="130" rx="16"/>
    <circle cx="490" cy="200" r="15" fill="#b27b34"/>
    <text class="num" x="486" y="205">3</text>
    <text class="stepTitle" x="484" y="238">ReAct Loop</text>
    <text class="small" x="484" y="265">think · act · observe</text>
  </g>
  <g filter="url(#shadow)">
    <rect class="guard" x="660" y="170" width="150" height="130" rx="16"/>
    <circle cx="690" cy="200" r="15" fill="#3b8060"/>
    <text class="num" x="686" y="205">4</text>
    <text class="stepTitle" x="684" y="238">Tool Gate</text>
    <text class="small" x="684" y="265">policy · HITL · sandbox</text>
  </g>
  <g filter="url(#shadow)">
    <rect class="quality" x="860" y="170" width="150" height="130" rx="16"/>
    <circle cx="890" cy="200" r="15" fill="#4779a8"/>
    <text class="num" x="886" y="205">5</text>
    <text class="stepTitle" x="884" y="238">Trace</text>
    <text class="small" x="884" y="265">journal · replay · evidence</text>
  </g>

  <path class="line" d="M210 235 L250 235"/>
  <path class="line" d="M410 235 L450 235"/>
  <path class="line" d="M610 235 L650 235"/>
  <path class="line" d="M810 235 L850 235"/>

  <g filter="url(#shadow)">
    <rect class="quality" x="350" y="365" width="500" height="84" rx="18"/>
    <text class="stepTitle" x="390" y="398">Quality Feedback Loop</text>
    <text class="small" x="390" y="424">failure classification · regression samples · prompt smoke eval · rollback</text>
  </g>

  <path class="dash" d="M935 300 C910 350 850 386 850 406"/>
  <path class="dash" d="M350 406 C260 390 180 338 135 302"/>
  <path class="dash" d="M735 300 C710 336 674 356 632 365"/>
</svg>
