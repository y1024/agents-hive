<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Local Worker Hive architecture</title>
  <desc id="desc">A diagram showing central Hive control plane coordinating local worker daemons on user computers, intranet machines, and compute nodes through outbound connections.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f5efe4"/>
      <stop offset="1" stop-color="#eaf4f1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#253745" flood-opacity="0.13"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#365365"/>
    </marker>
    <style>
      text { font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2933; }
      .title { font-size: 34px; font-weight: 800; }
      .subtitle { font-size: 16px; fill: #53636f; }
      .head { font-size: 19px; font-weight: 800; }
      .label { font-size: 15px; font-weight: 700; }
      .small { font-size: 13px; fill: #52636f; }
      .tiny { font-size: 12px; fill: #667681; }
      .core { fill: #22323d; stroke: #354b58; stroke-width: 1.2; }
      .coreText { fill: #f0f7fb; }
      .coreMuted { fill: #b9c8d2; }
      .node { fill: #fffdf8; stroke: #d8ceb9; stroke-width: 1.2; }
      .policy { fill: #eef8f2; stroke: #9bc8ab; stroke-width: 1.2; }
      .line { fill: none; stroke: #365365; stroke-width: 2.2; marker-end: url(#arrow); }
      .return { fill: none; stroke: #8196a3; stroke-width: 1.8; stroke-dasharray: 7 7; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1200" height="560" rx="28" fill="url(#bg)"/>
  <text class="title" x="60" y="72">Local Worker Hive</text>
  <text class="subtitle" x="60" y="104">用户本地 CLI / daemon 主动连接中心控制面，在策略、审计和对象存储约束下执行任务</text>

  <g filter="url(#shadow)">
    <rect class="core" x="430" y="155" width="340" height="250" rx="20"/>
    <text class="head coreText" x="476" y="198">Central Control Plane</text>
    <text class="small coreMuted" x="476" y="226">auth · policy · task routing · audit</text>
    <rect x="476" y="260" width="248" height="38" rx="11" fill="#304754" stroke="#4b6675"/>
    <text class="label coreText" x="506" y="285">Worker Registry</text>
    <rect x="476" y="316" width="248" height="38" rx="11" fill="#304754" stroke="#4b6675"/>
    <text class="label coreText" x="518" y="341">Task Queue</text>
  </g>

  <g filter="url(#shadow)">
    <rect class="node" x="70" y="165" width="245" height="96" rx="18"/>
    <text class="label" x="106" y="205">User Laptop Worker</text>
    <text class="small" x="106" y="232">local repo · shell · files</text>
  </g>
  <g filter="url(#shadow)">
    <rect class="node" x="70" y="322" width="245" height="96" rx="18"/>
    <text class="label" x="106" y="362">Intranet Worker</text>
    <text class="small" x="106" y="389">private APIs · internal docs</text>
  </g>
  <g filter="url(#shadow)">
    <rect class="node" x="885" y="165" width="245" height="96" rx="18"/>
    <text class="label" x="925" y="205">Compute Worker</text>
    <text class="small" x="925" y="232">OCR · embedding · batch jobs</text>
  </g>
  <g filter="url(#shadow)">
    <rect class="node" x="885" y="322" width="245" height="96" rx="18"/>
    <text class="label" x="925" y="362">Private Model Worker</text>
    <text class="small" x="925" y="389">local LLM · secure network</text>
  </g>

  <path class="line" d="M315 213 C358 213 382 213 420 213"/>
  <path class="line" d="M315 370 C360 350 385 334 420 318"/>
  <path class="line" d="M885 213 C842 213 814 213 780 213"/>
  <path class="line" d="M885 370 C840 350 814 334 780 318"/>

  <path class="return" d="M430 390 C346 455 230 474 132 423"/>
  <path class="return" d="M770 390 C854 455 970 474 1068 423"/>

  <g filter="url(#shadow)">
    <rect class="policy" x="300" y="465" width="600" height="58" rx="16"/>
    <text class="label" x="336" y="500">Every task remains permissioned, observable, replayable, and artifact-backed.</text>
  </g>

  <text class="tiny" x="116" y="148">outbound heartbeat</text>
  <text class="tiny" x="924" y="148">capability report</text>
  <text class="tiny" x="512" y="437">result + artifact return</text>
</svg>
